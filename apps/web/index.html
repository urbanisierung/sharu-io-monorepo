<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#07070f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="any" href="/logo.png" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="canonical" href="%SITE_URL%/" />

    <title>Sharu — zero-knowledge, local-first backup &amp; sync</title>
    <meta
      name="description"
      content="Sharu is a zero-knowledge, local-first backup &amp; sync platform. Files are encrypted on your device and synced peer-to-peer across your own machines — no servers, no accounts, no one who can read them but you."
    />

    <!-- Open Graph (link unfurls in Slack, Discord, iMessage, Facebook…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sharu" />
    <meta property="og:title" content="Sharu — zero-knowledge, local-first backup &amp; sync" />
    <meta
      property="og:description"
      content="Encrypt on your device, sync peer-to-peer across your own machines. No servers, no accounts, no one who can read your files but you."
    />
    <meta property="og:url" content="%SITE_URL%/" />
    <meta property="og:image" content="%SITE_URL%/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Sharu — your data, your devices, nobody else." />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sharu — zero-knowledge, local-first backup &amp; sync" />
    <meta
      name="twitter:description"
      content="Encrypt on your device, sync peer-to-peer across your own machines. No servers, no accounts, no one who can read your files but you."
    />
    <meta name="twitter:image" content="%SITE_URL%/og.png" />
    <meta name="twitter:image:alt" content="Sharu — your data, your devices, nobody else." />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
