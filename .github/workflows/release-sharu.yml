name: Release sharu

# Builds the `sharu` CLI for the major desktop/server platforms and publishes
# the binaries to a GitHub release. Triggered by pushing a `sharu-v*` tag
# (e.g. `sharu-v0.1.0`), or manually via the Actions tab.
#
# Asset names are version-less and target-based (`sharu-<target>.tar.gz` /
# `.zip`) so the install scripts can fetch them from the stable
# `releases/latest/download/<asset>` URL with no API calls.

on:
  push:
    tags: ['sharu-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/update (e.g. sharu-v0.1.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-sharu-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # The binary bakes its version from CARGO_PKG_VERSION, but the release
      # *tag* is the source of truth (`sharu-v<version>`). Stamp the tag's
      # version into Cargo.toml before building so the published binary reports
      # the version it was released as — keeping `sharu version` honest and
      # stopping the updater from nagging about the release it already is.
      # Editing the manifest invalidates the crate's build fingerprint, so a
      # cached target dir never carries a stale baked-in version.
      - name: Stamp version from release tag
        shell: bash
        working-directory: crates/sharu
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#sharu-v}"
          if [ "$version" = "$tag" ] || [ -z "$version" ]; then
            echo "::error::'$tag' is not a sharu-v<version> release tag"
            exit 1
          fi
          # Only the [package] version sits at the start of a line; dependency
          # versions are inside `{ … }`, so the anchored match never touches them.
          sed -i.bak -E "s/^version = \"[^\"]*\"/version = \"$version\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "stamped sharu version = $version"
          grep -E '^version = ' Cargo.toml

      - name: Build
        run: cargo build --release -p sharu --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="sharu-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" sharu
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "sharu-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/sharu.exe" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -FilePath "$archive.sha256" -Encoding ascii -NoNewline

      - uses: actions/upload-artifact@v4
        with:
          name: sharu-${{ matrix.target }}
          path: |
            sharu-${{ matrix.target }}.tar.gz
            sharu-${{ matrix.target }}.zip
            sharu-${{ matrix.target }}.*.sha256
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout first: it cleans the workspace, so it must precede the artifact
      # download. We need the repo for the committed public key.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Sign every archive with minisign so `sharu update --apply` can verify
      # a download against the embedded public key before replacing the binary.
      # No secret configured → publish unsigned (with a warning) rather than fail;
      # the updater then declines to self-apply. See crates/sharu/RELEASING.md.
      - name: Sign assets (minisign)
        shell: bash
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::warning::MINISIGN_SECRET_KEY is not set — publishing UNSIGNED. Configure it to sign releases (crates/sharu/RELEASING.md)."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y minisign
          umask 077
          keyfile="$RUNNER_TEMP/minisign.key"
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$keyfile"
          trap 'rm -f "$keyfile"' EXIT
          for f in dist/sharu-*.tar.gz dist/sharu-*.zip; do
            [ -e "$f" ] || continue
            # Passwordless key → no prompt; </dev/null guards against any read.
            minisign -S -s "$keyfile" -m "$f" </dev/null
            echo "signed $(basename "$f") -> $(basename "$f").minisig"
          done
          # Publish the public key alongside the assets, for transparency.
          cp crates/sharu/keys/sharu.pub dist/sharu.pub

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/**
