name: Release safu-node

# Builds the `safu-node` CLI for the major desktop/server platforms and publishes
# the binaries to a GitHub release. Triggered by pushing a `safu-node-v*` tag
# (e.g. `safu-node-v0.1.0`), or manually via the Actions tab.
#
# Asset names are version-less and target-based (`safu-node-<target>.tar.gz` /
# `.zip`) so the install scripts can fetch them from the stable
# `releases/latest/download/<asset>` URL with no API calls.

on:
  push:
    tags: ['safu-node-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/update (e.g. safu-node-v0.1.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-safu-node-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p safu-node --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="safu-node-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" safu-node
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "safu-node-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/safu-node.exe" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -FilePath "$archive.sha256" -Encoding ascii -NoNewline

      - uses: actions/upload-artifact@v4
        with:
          name: safu-node-${{ matrix.target }}
          path: |
            safu-node-${{ matrix.target }}.tar.gz
            safu-node-${{ matrix.target }}.zip
            safu-node-${{ matrix.target }}.*.sha256
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/**
